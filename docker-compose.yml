services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: catalyst
      POSTGRES_PASSWORD: catalyst
      POSTGRES_DB: catalyst_radar
    ports:
      - "54321:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalyst -d catalyst_radar"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: python -m uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
    environment:
      PYTHONPATH: /app/src:/app
      CATALYST_DATABASE_URL: postgresql+psycopg://catalyst:catalyst@postgres:5432/catalyst_radar
      CATALYST_SEC_ENABLE_LIVE: ${CATALYST_SEC_ENABLE_LIVE:-false}
      CATALYST_SEC_USER_AGENT: ${CATALYST_SEC_USER_AGENT:-}
      CATALYST_SEC_BASE_URL: ${CATALYST_SEC_BASE_URL:-https://data.sec.gov}
      CATALYST_SEC_DAILY_MAX_TICKERS: ${CATALYST_SEC_DAILY_MAX_TICKERS:-5}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: streamlit run apps/dashboard/Home.py --server.address 0.0.0.0 --server.port 8501 --server.headless true
    environment:
      PYTHONPATH: /app/src:/app
      CATALYST_DATABASE_URL: postgresql+psycopg://catalyst:catalyst@postgres:5432/catalyst_radar
      CATALYST_SEC_ENABLE_LIVE: ${CATALYST_SEC_ENABLE_LIVE:-false}
      CATALYST_SEC_USER_AGENT: ${CATALYST_SEC_USER_AGENT:-}
      CATALYST_SEC_BASE_URL: ${CATALYST_SEC_BASE_URL:-https://data.sec.gov}
      CATALYST_SEC_DAILY_MAX_TICKERS: ${CATALYST_SEC_DAILY_MAX_TICKERS:-5}
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: python -m apps.worker.main
    environment:
      PYTHONPATH: /app/src:/app
      CATALYST_DATABASE_URL: postgresql+psycopg://catalyst:catalyst@postgres:5432/catalyst_radar
      CATALYST_WORKER_INTERVAL_SECONDS: "86400"
      CATALYST_RUN_LLM: "0"
      CATALYST_LLM_DRY_RUN: "1"
      CATALYST_DRY_RUN_ALERTS: "1"
      CATALYST_SEC_ENABLE_LIVE: ${CATALYST_SEC_ENABLE_LIVE:-false}
      CATALYST_SEC_USER_AGENT: ${CATALYST_SEC_USER_AGENT:-}
      CATALYST_SEC_BASE_URL: ${CATALYST_SEC_BASE_URL:-https://data.sec.gov}
      CATALYST_SEC_DAILY_MAX_TICKERS: ${CATALYST_SEC_DAILY_MAX_TICKERS:-5}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
